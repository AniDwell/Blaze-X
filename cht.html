<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blaze-X | Direct Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #050505; color: #e5e5e5; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; touch-action: pan-y; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .typing-dot { animation: typing-bounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing-bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .message-bubble { transition: transform 0.25s cubic-bezier(0.1, 0.7, 0.1, 1); will-change: transform; }
        
        /* Heavy Rich UI Styles */
        .glass-header { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bubble-me { background: linear-gradient(135deg, #F47521 0%, #D95A11 100%); color: #000; box-shadow: 0 4px 15px rgba(244,117,33,0.3); border: 1px solid #ff8a3d; }
        .bubble-them { background: linear-gradient(135deg, #1a1a1a 0%, #111 100%); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
        .bubble-emoji-only { background: transparent !important; box-shadow: none !important; border: none !important; font-size: 3.5rem !important; line-height: 1 !important; padding: 0 !important; }
        
        .selection-checkbox:checked + div { background-color: #F47521; border-color: #F47521; }
        .selection-checkbox:checked + div i { opacity: 1; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChgVcbDPzc6AMeoac1hCOx39YK_1mEKvU",
            authDomain: "blaze-x-db2f5.firebaseapp.com",
            projectId: "blaze-x-db2f5",
            storageBucket: "blaze-x-db2f5.firebasestorage.app",
            messagingSenderId: "770812306638",
            appId: "1:770812306638:web:eaf5ded647861f32c25c9f"
        };

        window.app = window.app || {};
        window.app.firebaseApp = initializeApp(firebaseConfig);
        window.app.db = getFirestore(window.app.firebaseApp);
    </script>
    <script src="auth.js"></script>
</head>
<body class="flex flex-col h-[100dvh] bg-[#050505]">

    <header class="glass-header w-full h-16 flex items-center px-4 shrink-0 z-50 fixed top-0 justify-between shadow-2xl">
        <div class="flex items-center">
            <button onclick="window.history.back()" class="text-white p-2 hover:bg-white/10 rounded-full transition-colors mr-2">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile()">
                <img id="header-pfp" src="https://via.placeholder.com/100/222/fff?text=U" class="w-10 h-10 rounded-full object-cover border border-[#F47521] shadow-[0_0_10px_rgba(244,117,33,0.3)]">
                <div class="flex flex-col">
                    <h2 id="header-name" class="text-white font-black text-sm tracking-wide leading-tight">Loading...</h2>
                    <span id="header-status" class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Offline</span>
                </div>
            </div>
        </div>
        
        <div class="relative">
            <button onclick="toggleHeaderMenu()" class="text-white p-2 hover:bg-white/10 rounded-full transition-colors">
                <i class="fas fa-ellipsis-v text-lg"></i>
            </button>
            <div id="header-dropdown" class="hidden absolute right-0 top-full mt-2 w-48 bg-[#111] border border-white/10 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] overflow-hidden z-50">
                <button onclick="toggleSelectionMode()" class="w-full text-left px-4 py-3 text-white text-xs font-bold uppercase tracking-wider hover:bg-[#F47521] hover:text-black transition-colors"><i class="fas fa-check-square mr-2"></i> Select Messages</button>
                <button onclick="clearFullChat()" class="w-full text-left px-4 py-3 text-white text-xs font-bold uppercase tracking-wider hover:bg-[#F47521] hover:text-black transition-colors"><i class="fas fa-eraser mr-2"></i> Clear Chat</button>
                <button onclick="blockUser()" class="w-full text-left px-4 py-3 text-red-500 text-xs font-bold uppercase tracking-wider hover:bg-red-500 hover:text-white transition-colors border-t border-white/5"><i class="fas fa-ban mr-2"></i> Block</button>
            </div>
        </div>
    </header>

    <div id="bulk-action-bar" class="hidden fixed top-0 left-0 w-full h-16 bg-[#F47521] z-[60] flex items-center justify-between px-4 shadow-2xl transition-transform">
        <div class="flex items-center gap-3">
            <button onclick="toggleSelectionMode()" class="text-black p-2 rounded-full hover:bg-black/10"><i class="fas fa-times text-xl"></i></button>
            <span id="bulk-count" class="text-black font-black text-lg">0</span>
        </div>
        <button onclick="deleteSelectedMessages()" class="text-black p-2 rounded-full hover:bg-black/10"><i class="fas fa-trash text-xl"></i></button>
    </div>

    <main id="chat-container" class="flex-1 overflow-y-auto hide-scrollbar pt-20 pb-20 px-4 flex flex-col gap-4 scroll-smooth bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
        <div id="chat-loader" class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
            <i class="fas fa-circle-notch fa-spin text-4xl text-[#F47521]"></i>
        </div>

        <div id="chat-intro" class="w-full flex flex-col items-center justify-center py-10 opacity-0 transition-opacity duration-500 hidden">
            <img id="intro-pfp" src="https://via.placeholder.com/150/222/fff?text=U" class="w-28 h-28 rounded-full object-cover border-4 border-[#F47521] shadow-[0_0_30px_rgba(244,117,33,0.4)] mb-4">
            <h3 id="intro-name" class="text-2xl font-black text-white mb-1 tracking-tight">...</h3>
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-6">Blaze-X Secured Chat</p>
            <button onclick="openProfile()" class="bg-[#111] hover:bg-white text-white hover:text-black border border-white/20 hover:border-white px-8 py-2.5 rounded-full text-xs font-black uppercase tracking-widest transition-all shadow-lg">
                View Profile
            </button>
        </div>

        <div id="messages-list" class="flex flex-col gap-3 pb-4 mt-auto"></div>
        
        <div id="typing-indicator" class="hidden flex gap-2 items-center self-start bg-[#111] border border-white/5 shadow-lg rounded-2xl rounded-bl-sm px-5 py-4 ml-2 mb-2">
            <div class="w-2 h-2 bg-[#F47521] rounded-full typing-dot"></div>
            <div class="w-2 h-2 bg-[#F47521] rounded-full typing-dot"></div>
            <div class="w-2 h-2 bg-[#F47521] rounded-full typing-dot"></div>
        </div>
    </main>

    <button id="new-msg-badge" onclick="scrollToBottom(true)" class="hidden fixed bottom-20 right-4 bg-[#F47521] text-black rounded-full p-1.5 shadow-[0_10px_20px_rgba(0,0,0,0.8)] z-40 flex items-center gap-2 pr-4 animate-bounce hover:scale-105 transition-transform border border-[#ff8a3d]">
        <img id="badge-pfp" src="" class="w-8 h-8 rounded-full object-cover border border-black/20">
        <div class="flex flex-col items-start">
            <span class="text-[10px] font-black uppercase leading-tight">New Message</span>
            <i class="fas fa-chevron-down text-[10px]"></i>
        </div>
    </button>

    <div id="reply-banner" class="hidden fixed bottom-[72px] left-0 right-0 bg-[#0a0a0a] border-t border-b border-[#F47521]/30 px-4 py-3 flex items-center justify-between z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div class="flex flex-col border-l-4 border-[#F47521] pl-3 min-w-0">
            <span class="text-[10px] font-black text-[#F47521] uppercase tracking-widest">Replying to <span id="reply-target-name">...</span></span>
            <span id="reply-target-text" class="text-sm text-gray-300 truncate font-medium">...</span>
            <input type="hidden" id="reply-target-id">
        </div>
        <button onclick="cancelReply()" class="text-gray-500 hover:text-white p-2 bg-[#111] rounded-full w-8 h-8 flex items-center justify-center border border-white/10 shadow-lg">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <footer class="glass-header w-full p-3 shrink-0 fixed bottom-0 z-50 flex gap-3 items-end">
        <button onclick="openImageModal()" class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-[#F47521] bg-[#111] rounded-xl shrink-0 transition-colors border border-white/5 shadow-inner">
            <i class="fas fa-plus text-lg"></i>
        </button>
        
        <div class="flex-1 bg-[#111] border border-white/10 rounded-2xl flex items-center focus-within:border-[#F47521] transition-colors relative min-h-[44px] shadow-inner">
            <textarea id="chat-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent text-white text-[15px] px-4 py-3 outline-none resize-none hide-scrollbar max-h-32 leading-snug" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'; triggerTyping();"></textarea>
        </div>
        
        <button id="send-btn" onclick="sendMessage()" class="w-11 h-11 flex items-center justify-center bg-[#F47521] text-black rounded-xl shrink-0 transition-transform active:scale-90 shadow-[0_4px_15px_rgba(244,117,33,0.4)] border border-[#ff8a3d]">
            <i class="fas fa-paper-plane text-lg relative right-[1px] bottom-[1px]"></i>
        </button>
    </footer>

    <div id="image-preview-modal" class="fixed inset-0 bg-black/95 z-[300] hidden flex-col items-center justify-between py-10 px-4">
        <div class="w-full flex justify-between items-center px-2">
            <button onclick="closeImageModal()" class="text-white text-xl p-2"><i class="fas fa-times"></i></button>
            <h3 class="text-white font-black uppercase tracking-widest text-xs">Send Image</h3>
            <div class="w-8"></div>
        </div>
        
        <div class="flex-1 w-full flex items-center justify-center p-4">
            <img id="preview-img-target" src="" class="max-w-full max-h-full rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] border border-white/10">
            <input type="file" id="real-image-input" accept="image/*" class="hidden" onchange="handleImageSelection(event)">
        </div>

        <div class="w-full max-w-md bg-[#111] border border-white/10 p-4 rounded-3xl flex flex-col gap-4 shadow-2xl">
            <div class="flex gap-2 bg-black p-1 rounded-xl">
                <button id="mode-unlimited" onclick="setImageMode('unlimited')" class="flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg bg-[#F47521] text-black transition-colors shadow-md">Unlimited</button>
                <button id="mode-once" onclick="setImageMode('once')" class="flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg text-gray-500 hover:text-white transition-colors">View Once</button>
            </div>
            <input type="hidden" id="selected-image-mode" value="unlimited">
            
            <div class="flex gap-3">
                <input type="text" id="image-caption" placeholder="Add a caption..." class="flex-1 bg-black border border-white/10 rounded-xl px-4 text-sm text-white focus:border-[#F47521] outline-none">
                <button id="confirm-img-send-btn" onclick="executeImageSend()" class="w-12 h-12 bg-[#F47521] rounded-xl flex items-center justify-center text-black shadow-lg hover:scale-105 transition-transform"><i class="fas fa-paper-plane text-lg"></i></button>
            </div>
        </div>
    </div>

    <div id="lightbox-modal" class="fixed inset-0 bg-black/95 z-[400] hidden flex-col items-center justify-center backdrop-blur-md">
        <div class="absolute top-6 w-full flex justify-between px-6 z-10">
            <button onclick="closeLightbox()" class="text-white text-2xl hover:text-[#F47521] transition-colors"><i class="fas fa-times"></i></button>
            <button onclick="downloadLightboxImage()" class="text-white text-2xl hover:text-[#F47521] transition-colors"><i class="fas fa-download"></i></button>
        </div>
        <img id="lightbox-img" src="" class="max-w-[95%] max-h-[80%] rounded-lg shadow-2xl border border-white/10">
        <p id="lightbox-caption" class="text-white mt-6 text-sm font-medium tracking-wide"></p>
    </div>

    <div id="msg-options-modal" class="fixed inset-0 bg-black/80 z-[200] hidden items-end justify-center transition-opacity opacity-0" onclick="closeMsgOptions(event)">
        <div class="bg-[#111] w-full max-w-md rounded-t-3xl p-6 flex flex-col gap-2 transform translate-y-full transition-transform duration-300 border-t border-[#F47521]/30 shadow-[0_-20px_50px_rgba(0,0,0,0.8)]" id="msg-options-panel">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-4"></div>
            <input type="hidden" id="opt-msg-id">
            <input type="hidden" id="opt-msg-text">
            
            <button onclick="optionReply()" class="w-full text-left px-5 py-4 text-white font-black text-xs uppercase tracking-widest bg-white/5 rounded-xl hover:bg-[#F47521] hover:text-black transition-colors"><i class="fas fa-reply w-8 text-lg"></i> Reply</button>
            <button onclick="optionShare()" class="w-full text-left px-5 py-4 text-white font-black text-xs uppercase tracking-widest bg-white/5 rounded-xl hover:bg-[#F47521] hover:text-black transition-colors"><i class="fas fa-share w-8 text-lg"></i> Share</button>
            <button id="opt-edit" onclick="optionEdit()" class="hidden w-full text-left px-5 py-4 text-white font-black text-xs uppercase tracking-widest bg-white/5 rounded-xl hover:bg-[#F47521] hover:text-black transition-colors"><i class="fas fa-pen w-8 text-lg"></i> Edit</button>
            <button id="opt-delete" onclick="optionDelete()" class="hidden w-full text-left px-5 py-4 text-red-500 font-black text-xs uppercase tracking-widest bg-red-500/10 border border-red-500/20 rounded-xl hover:bg-red-500 hover:text-white transition-colors mt-2"><i class="fas fa-trash w-8 text-lg"></i> Delete</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let targetUser = null;
        let chatId = null;
        let messagesUnsub = null;
        let typingTimeout = null;
        let isEditingId = null;
        
        let isSelectionMode = false;
        let selectedMessages = new Set();
        let isUserScrollingUp = false;

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUid = urlParams.get('user');

            if (!targetUid) {
                if(window.app.showCustomAlert) window.app.showCustomAlert("Target user ID missing.", "error");
                window.location.href = 'index.html';
                return;
            }

            try {
                const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js');
                const firestore = await import('https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js');
                
                if (!window.app || !window.app.firebaseApp) throw new Error("Firebase config missing.");

                const auth = getAuth(window.app.firebaseApp);
                window.db = window.app.db;
                window.fs = firestore;

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const userDoc = await fs.getDoc(fs.doc(db, "users", user.uid));
                        currentUser = userDoc.exists() ? userDoc.data() : { uid: user.uid, name: user.displayName || "User" };
                    } else {
                        const localGuest = localStorage.getItem('blazex_user_profile');
                        if (localGuest && JSON.parse(localGuest).uid.startsWith('anon_')) {
                            currentUser = JSON.parse(localGuest);
                        } else {
                            alert("Please log in to chat."); window.location.href = 'index.html'; return;
                        }
                    }

                    if(currentUser.uid === targetUid) {
                        alert("You cannot chat with yourself."); window.history.back(); return;
                    }

                    chatId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;

                    const targetSnap = await fs.getDoc(fs.doc(db, "users", targetUid));
                    if (!targetSnap.exists()) {
                        alert("User does not exist."); window.history.back(); return;
                    }
                    targetUser = targetSnap.data();

                    const pfp = targetUser.pfpLink || targetUser.photoURL || 'https://via.placeholder.com/150/222/fff?text=U';
                    document.getElementById('header-pfp').src = pfp;
                    document.getElementById('intro-pfp').src = pfp;
                    document.getElementById('badge-pfp').src = pfp;
                    document.getElementById('header-name').innerText = targetUser.name || 'Anonymous';
                    document.getElementById('intro-name').innerText = targetUser.name || 'Anonymous';
                    
                    document.getElementById('chat-loader').classList.add('hidden');
                    document.getElementById('chat-intro').classList.remove('hidden');
                    setTimeout(() => document.getElementById('chat-intro').classList.remove('opacity-0'), 100);

                    setupMessagesListener();
                    setupTypingListener();
                    setupScrollListener();
                });
            } catch (err) {
                document.getElementById('chat-loader').innerHTML = '<p class="text-red-500 font-bold">Initialization Failed.</p>';
            }
        });

        // --- LISTENERS ---
        function setupMessagesListener() {
            const q = fs.query(fs.collection(db, `chats/${chatId}/messages`), fs.orderBy("timestamp", "asc"));
            
            messagesUnsub = fs.onSnapshot(q, { includeMetadataChanges: true }, (snapshot) => {
                const list = document.getElementById('messages-list');
                
                snapshot.docChanges().forEach(change => {
                    const data = { id: change.doc.id, isPending: change.doc.metadata.hasPendingWrites, ...change.doc.data() };
                    
                    if (change.type === "added") {
                        renderMessage(data, list);
                        if(isUserScrollingUp && data.senderId !== currentUser.uid && !data.isPending) {
                            document.getElementById('new-msg-badge').classList.remove('hidden');
                        } else {
                            setTimeout(() => scrollToBottom(true), 100);
                        }
                    }
                    if (change.type === "modified") {
                        const el = document.getElementById(`msg-${change.doc.id}`);
                        if(el) updateMessageDOM(el, data);
                    }
                    if (change.type === "removed") {
                        const el = document.getElementById(`msg-container-${change.doc.id}`);
                        if(el) el.remove();
                    }
                });

                // Update 'Seen' status for received messages
                snapshot.docs.forEach(doc => {
                    const d = doc.data();
                    if(d.senderId !== currentUser.uid && d.status !== 'seen') {
                        fs.updateDoc(doc.ref, { status: 'seen' });
                    }
                });
            });
        }

        function setupTypingListener() {
            fs.onSnapshot(fs.doc(db, "chats", chatId), (doc) => {
                if (doc.exists() && doc.data().typing && doc.data().typing[targetUser.uid]) {
                    document.getElementById('header-status').innerText = "Typing...";
                    document.getElementById('header-status').classList.replace('text-gray-500', 'text-[#F47521]');
                    document.getElementById('typing-indicator').classList.remove('hidden');
                    if(!isUserScrollingUp) scrollToBottom();
                } else {
                    document.getElementById('header-status').innerText = "Online";
                    document.getElementById('header-status').classList.replace('text-[#F47521]', 'text-gray-500');
                    document.getElementById('typing-indicator').classList.add('hidden');
                }
            });
        }

        window.triggerTyping = () => {
            if (typingTimeout) clearTimeout(typingTimeout);
            fs.setDoc(fs.doc(db, "chats", chatId), { typing: { [currentUser.uid]: true } }, { merge: true });
            typingTimeout = setTimeout(() => { fs.setDoc(fs.doc(db, "chats", chatId), { typing: { [currentUser.uid]: false } }, { merge: true }); }, 2000);
        }

        function setupScrollListener() {
            const c = document.getElementById('chat-container');
            c.addEventListener('scroll', () => {
                isUserScrollingUp = (c.scrollHeight - c.scrollTop - c.clientHeight > 150);
                if (!isUserScrollingUp) document.getElementById('new-msg-badge').classList.add('hidden');
            });
        }

        window.scrollToBottom = (smooth = false) => {
            const c = document.getElementById('chat-container');
            c.scrollTo({ top: c.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
            document.getElementById('new-msg-badge').classList.add('hidden');
        }

        // --- RENDER LOGIC ---
        function renderMessage(msg, container) {
            const isMe = msg.senderId === currentUser.uid;
            
            // Check if text is ONLY emoji (Max 5 characters, no alphanumeric)
            const isEmojiOnly = msg.text && msg.text.length <= 10 && !/[a-zA-Z0-9]/.test(msg.text);
            
            const alignClass = isMe ? 'self-end bubble-me' : 'self-start bubble-them';
            const finalClass = isEmojiOnly ? `self-${isMe?'end':'start'} bubble-emoji-only` : alignClass;

            let statusHtml = '';
            let timeStr = "";

            if (isMe) {
                if (msg.isPending) {
                    timeStr = "Sending...";
                    statusHtml = `<i class="far fa-clock"></i>`;
                } else {
                    const d = msg.timestamp ? msg.timestamp.toDate() : new Date();
                    timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    if (msg.status === 'seen') {
                        statusHtml = `<i class="fas fa-check-double text-blue-400"></i>`;
                    } else if (msg.status === 'delivered') {
                        statusHtml = `<i class="fas fa-check-double"></i>`;
                    } else {
                        statusHtml = `<i class="fas fa-check"></i>`;
                    }
                }
            } else {
                if (msg.timestamp) {
                    const d = msg.timestamp.toDate ? msg.timestamp.toDate() : new Date();
                    timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            }

            let replyHtml = '';
            if (msg.replyTo && !isEmojiOnly) {
                replyHtml = `<div class="bg-black/30 border-l-4 border-white/50 pl-2 py-1.5 mb-2 rounded shadow-inner text-[11px] opacity-90 line-clamp-1 border-white/20 text-white/80 font-medium">${msg.replyText || 'Replied'}</div>`;
            }

            let imgHtml = '';
            if (msg.imageUrl) {
                if (msg.viewMode === 'once') {
                    const hasViewed = msg.viewedBy && msg.viewedBy.includes(currentUser.uid);
                    if (hasViewed) {
                        imgHtml = `<div class="bg-white/10 rounded-lg p-4 text-center border border-white/20 mb-2 opacity-50"><i class="fas fa-eye-slash text-2xl mb-1 text-gray-400"></i><p class="text-[10px] font-bold uppercase">Opened</p></div>`;
                    } else {
                        imgHtml = `<button onclick="viewOnceImage('${msg.id}', '${msg.imageUrl}')" class="w-full bg-[#F47521] text-black rounded-lg p-4 text-center font-black uppercase tracking-widest text-xs mb-2 shadow-lg hover:scale-[1.02] transition-transform"><i class="fas fa-camera text-xl block mb-1"></i> View Photo</button>`;
                    }
                } else {
                    imgHtml = `<img src="${msg.imageUrl}" onclick="openLightbox('${msg.imageUrl}', '${msg.text || ''}')" class="w-full max-w-[220px] md:max-w-[280px] rounded-lg mb-2 cursor-pointer border border-white/10 shadow-lg mt-1">`;
                }
            }

            const safeText = msg.text ? msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
            const textHtml = safeText && !isEmojiOnly ? `<p class="text-[15px] leading-relaxed break-words font-medium">${safeText}</p>` : (isEmojiOnly ? safeText : '');

            const infoRow = !isEmojiOnly ? `
                <div class="flex items-center justify-end gap-1.5 mt-1.5 opacity-60">
                    ${msg.isEdited ? `<span class="text-[9px] font-bold italic tracking-wider mr-1">(edited)</span>` : ''}
                    <span class="text-[9px] font-black tracking-widest uppercase time-display">${timeStr}</span>
                    <span class="text-[10px] status-icon">${statusHtml}</span>
                </div>
            ` : '';

            // Wrapping inside a container to support selection checkboxes
            const html = `
                <div id="msg-container-${msg.id}" class="flex items-center gap-2 w-full justify-${isMe ? 'end' : 'start'}">
                    <label class="selection-box hidden shrink-0 cursor-pointer pl-1">
                        <input type="checkbox" class="hidden selection-checkbox" value="${msg.id}" onchange="updateBulkCount()">
                        <div class="w-6 h-6 rounded border-2 border-gray-500 flex items-center justify-center transition-colors"><i class="fas fa-check text-black text-xs opacity-0"></i></div>
                    </label>

                    <div id="msg-${msg.id}" class="message-bubble relative max-w-[80%] px-4 py-2.5 rounded-2xl ${finalClass}" 
                         data-id="${msg.id}" data-text="${safeText}" data-isme="${isMe}">
                        ${replyHtml}
                        ${imgHtml}
                        ${textHtml}
                        ${infoRow}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            
            const newElem = document.getElementById(`msg-${msg.id}`);
            attachSwipeEvents(newElem);
        }

        function updateMessageDOM(el, data) {
            const timeSpan = el.querySelector('.time-display');
            const statusSpan = el.querySelector('.status-icon');
            
            if (data.isPending) {
                if(timeSpan) timeSpan.innerText = "Sending...";
                if(statusSpan) statusSpan.innerHTML = `<i class="far fa-clock"></i>`;
            } else {
                const d = data.timestamp ? data.timestamp.toDate() : new Date();
                if(timeSpan) timeSpan.innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                if (data.senderId === currentUser.uid && statusSpan) {
                    if (data.status === 'seen') statusSpan.innerHTML = `<i class="fas fa-check-double text-blue-400"></i>`;
                    else if (data.status === 'delivered') statusSpan.innerHTML = `<i class="fas fa-check-double"></i>`;
                    else statusSpan.innerHTML = `<i class="fas fa-check"></i>`;
                }
            }

            if(data.viewMode === 'once' && data.viewedBy && data.viewedBy.includes(currentUser.uid)) {
                // Remove view button, show opened
                el.innerHTML = `<div class="bg-white/10 rounded-lg p-4 text-center border border-white/20 mb-2 opacity-50"><i class="fas fa-eye-slash text-2xl mb-1 text-gray-400"></i><p class="text-[10px] font-bold uppercase">Opened</p></div>` + el.innerHTML;
                const btn = el.querySelector('button'); if(btn) btn.remove();
            }

            el.setAttribute('data-text', data.text || '');
        }

        // --- MESSAGE ACTIONS ---
        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            const replyId = document.getElementById('reply-target-id').value;
            const replyText = document.getElementById('reply-target-text').innerText;
            const btn = document.getElementById('send-btn');
            
            if (!text && !isEditingId) return;

            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin text-sm"></i>`;
            input.disabled = true;

            try {
                if (isEditingId) {
                    await fs.updateDoc(fs.doc(db, `chats/${chatId}/messages`, isEditingId), { text, isEdited: true });
                    isEditingId = null;
                } else {
                    const msgData = { text, senderId: currentUser.uid, timestamp: fs.serverTimestamp(), status: 'sent' };
                    if (replyId) { msgData.replyTo = replyId; msgData.replyText = replyText; }
                    await fs.addDoc(fs.collection(db, `chats/${chatId}/messages`), msgData);
                }
                input.value = ''; input.style.height = '44px'; cancelReply(); scrollToBottom(true);
            } catch(e) { alert("Failed to send message."); }

            input.disabled = false;
            btn.innerHTML = `<i class="fas fa-paper-plane text-sm relative right-[1px] bottom-[1px]"></i>`;
            input.focus();
        }

        // --- IMAGE ENGINE ---
        window.openImageModal = () => { document.getElementById('real-image-input').click(); }
        
        window.handleImageSelection = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview-img-target').src = ev.target.result;
                document.getElementById('image-preview-modal').classList.remove('hidden');
                document.getElementById('image-preview-modal').classList.add('flex');
            };
            reader.readAsDataURL(file);
        }

        window.closeImageModal = () => {
            document.getElementById('image-preview-modal').classList.add('hidden');
            document.getElementById('image-preview-modal').classList.remove('flex');
            document.getElementById('real-image-input').value = '';
            document.getElementById('image-caption').value = '';
        }

        window.setImageMode = (mode) => {
            document.getElementById('selected-image-mode').value = mode;
            const uBtn = document.getElementById('mode-unlimited');
            const oBtn = document.getElementById('mode-once');
            if(mode === 'unlimited') {
                uBtn.className = "flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg bg-[#F47521] text-black transition-colors shadow-md";
                oBtn.className = "flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg text-gray-500 hover:text-white transition-colors";
            } else {
                oBtn.className = "flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg bg-[#F47521] text-black transition-colors shadow-md";
                uBtn.className = "flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg text-gray-500 hover:text-white transition-colors";
            }
        }

        window.executeImageSend = async () => {
            const file = document.getElementById('real-image-input').files[0];
            const caption = document.getElementById('image-caption').value.trim();
            const mode = document.getElementById('selected-image-mode').value;
            const btn = document.getElementById('confirm-img-send-btn');
            
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin text-lg"></i>`;
            const formData = new FormData(); formData.append("image", file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=4a683051e76ed12880a42aefa6ed427b`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.success) {
                    await fs.addDoc(fs.collection(db, `chats/${chatId}/messages`), {
                        text: caption, imageUrl: data.data.url, senderId: currentUser.uid, 
                        timestamp: fs.serverTimestamp(), status: 'sent', viewMode: mode, viewedBy: []
                    });
                    closeImageModal();
                    scrollToBottom(true);
                }
            } catch(e) { alert("Upload failed."); }
            btn.innerHTML = `<i class="fas fa-paper-plane text-lg"></i>`;
        }

        // --- LIGHTBOX ---
        window.openLightbox = (url, caption) => {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-caption').innerText = caption;
            document.getElementById('lightbox-modal').classList.remove('hidden');
            document.getElementById('lightbox-modal').classList.add('flex');
        }
        window.closeLightbox = () => {
            document.getElementById('lightbox-modal').classList.add('hidden');
            document.getElementById('lightbox-modal').classList.remove('flex');
        }
        window.downloadLightboxImage = async () => {
            const url = document.getElementById('lightbox-img').src;
            const a = document.createElement('a'); a.href = url; a.download = 'blazex_image.jpg'; a.target = '_blank';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        window.viewOnceImage = async (msgId, url) => {
            openLightbox(url, "View Once Photo");
            // Mark as viewed in DB
            await fs.updateDoc(fs.doc(db, `chats/${chatId}/messages`, msgId), { viewedBy: fs.arrayUnion(currentUser.uid) });
        }

        // --- BULK SELECTION ---
        window.toggleHeaderMenu = () => { document.getElementById('header-dropdown').classList.toggle('hidden'); }
        
        window.toggleSelectionMode = () => {
            isSelectionMode = !isSelectionMode;
            document.getElementById('header-dropdown').classList.add('hidden');
            
            const boxes = document.querySelectorAll('.selection-box');
            boxes.forEach(b => {
                if(isSelectionMode) b.classList.remove('hidden'); else b.classList.add('hidden');
                b.querySelector('input').checked = false;
            });
            
            selectedMessages.clear();
            updateBulkCount();

            const bar = document.getElementById('bulk-action-bar');
            if(isSelectionMode) { bar.classList.remove('hidden'); setTimeout(()=> bar.classList.add('translate-y-0'), 10); }
            else { bar.classList.add('hidden'); }
        }

        window.updateBulkCount = () => {
            selectedMessages.clear();
            document.querySelectorAll('.selection-checkbox:checked').forEach(cb => selectedMessages.add(cb.value));
            document.getElementById('bulk-count').innerText = selectedMessages.size;
        }

        window.deleteSelectedMessages = async () => {
            if(selectedMessages.size === 0) return toggleSelectionMode();
            if(!confirm(`Delete ${selectedMessages.size} messages?`)) return;
            try {
                const batch = fs.writeBatch(db);
                selectedMessages.forEach(id => {
                    const ref = fs.doc(db, `chats/${chatId}/messages`, id);
                    batch.delete(ref);
                });
                await batch.commit();
                toggleSelectionMode();
            } catch(e) { alert("Deletion failed"); }
        }

        window.clearFullChat = async () => {
            document.getElementById('header-dropdown').classList.add('hidden');
            if(!confirm("Clear ALL messages? This cannot be undone.")) return;
            try {
                const snaps = await fs.getDocs(fs.collection(db, `chats/${chatId}/messages`));
                const batch = fs.writeBatch(db);
                snaps.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            } catch(e) { alert("Clear failed"); }
        }

        window.blockUser = () => {
            alert("Block functionality will lock database writes via security rules.");
            document.getElementById('header-dropdown').classList.add('hidden');
        }

        // --- SWIPE TO REPLY / SHARE ---
        function attachSwipeEvents(el) {
            let startX = 0; let startY = 0; let currentX = 0;

            el.addEventListener('touchstart', (e) => {
                if(isSelectionMode) return;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                currentX = 0; el.style.transition = 'none';
                pressTimer = setTimeout(() => { triggerLongPress(el); }, 500);
            }, {passive: true});

            el.addEventListener('touchmove', (e) => {
                if(isSelectionMode) return;
                const dx = e.touches[0].clientX - startX;
                const dy = Math.abs(e.touches[0].clientY - startY);
                if (dy > 10) { clearTimeout(pressTimer); el.style.transform = `translateX(0px)`; return; }
                if (Math.abs(dx) > 10) clearTimeout(pressTimer);
                
                currentX = dx;
                // INCREASED THRESHOLD & VISUAL RESISTANCE
                if(dx > 0 && dx < 120) el.style.transform = `translateX(${dx * 0.6}px)`; 
                if(dx < 0 && dx > -120) el.style.transform = `translateX(${dx * 0.6}px)`; 
            }, {passive: true});

            el.addEventListener('touchend', (e) => {
                if(isSelectionMode) return;
                clearTimeout(pressTimer);
                el.style.transition = 'transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1)';
                el.style.transform = `translateX(0px)`;

                // REQUIRES LONGER SLIDE (> 60px physical slide)
                if (currentX > 60) {
                    navigator.vibrate?.(50);
                    const isMe = el.getAttribute('data-isme') === "true";
                    setReplyState(el.getAttribute('data-id'), el.getAttribute('data-text') || "Photo", isMe ? "Yourself" : targetUser.name);
                } else if (currentX < -60) {
                    navigator.vibrate?.(50);
                    const msgText = el.getAttribute('data-text');
                    if (window.app.components && window.app.components.share && msgText) { window.app.components.share(msgText); }
                }
            });
        }

        // --- UI HELPERS ---
        window.setReplyState = (id, text, username) => {
            document.getElementById('reply-target-id').value = id;
            document.getElementById('reply-target-name').innerText = username;
            document.getElementById('reply-target-text').innerText = text;
            document.getElementById('reply-banner').classList.remove('hidden');
            document.getElementById('chat-input').focus();
        }
        window.cancelReply = () => {
            document.getElementById('reply-target-id').value = '';
            document.getElementById('reply-banner').classList.add('hidden');
            isEditingId = null;
        }
        window.openProfile = () => { window.location.href = `profile.html?user=${targetUser.uid}`; }

        // --- LONG PRESS CONTEXT MENU ---
        function triggerLongPress(el) {
            navigator.vibrate?.(50);
            const id = el.getAttribute('data-id');
            const text = el.getAttribute('data-text');
            const isMe = el.getAttribute('data-isme') === "true";

            document.getElementById('opt-msg-id').value = id;
            document.getElementById('opt-msg-text').value = text;
            document.getElementById('opt-edit').classList.toggle('hidden', !isMe || !text);
            document.getElementById('opt-delete').classList.toggle('hidden', !isMe);

            const modal = document.getElementById('msg-options-modal');
            const panel = document.getElementById('msg-options-panel');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('translate-y-full'); }, 10);
        }

        window.closeMsgOptions = (e) => {
            if (e && e.target.id !== 'msg-options-modal' && e.target.tagName !== 'BUTTON') return;
            const modal = document.getElementById('msg-options-modal');
            const panel = document.getElementById('msg-options-panel');
            modal.classList.add('opacity-0'); panel.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        window.optionReply = () => {
            const id = document.getElementById('opt-msg-id').value;
            const text = document.getElementById('opt-msg-text').value || "Photo";
            setReplyState(id, text, "Message"); closeMsgOptions();
        }
        window.optionEdit = () => {
            const id = document.getElementById('opt-msg-id').value;
            const text = document.getElementById('opt-msg-text').value;
            isEditingId = id; const input = document.getElementById('chat-input');
            input.value = text; input.focus(); closeMsgOptions();
        }
        window.optionDelete = async () => {
            if(!confirm("Delete this message?")) return;
            try { await fs.deleteDoc(fs.doc(db, `chats/${chatId}/messages`, document.getElementById('opt-msg-id').value)); } catch(e){}
            closeMsgOptions();
        }
        window.optionShare = () => {
            const text = document.getElementById('opt-msg-text').value; closeMsgOptions();
            if (window.app.components && window.app.components.share && text) window.app.components.share(text);
        }
    </script>
</body>
</html>
