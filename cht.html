<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blaze-X | Premium Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Slim Message Bubbles */
        .bubble-recv { background: #111; color: #fff; padding: 10px 15px; border-radius: 12px 12px 12px 2px; border: 1px solid #222; max-width: 70%; }
        .bubble-sent { background: #F47521; color: #000; padding: 10px 15px; border-radius: 12px 12px 2px 12px; max-width: 70%; }
        
        /* Reply Box (Outside Bubble) */
        .reply-tag-outside { font-size: 8px; color: #F47521; text-transform: uppercase; font-weight: 900; margin-bottom: 2px; opacity: 0.9; }
        .reply-content-outside { font-size: 11px; background: #111; padding: 6px 10px; border-radius: 8px; margin-bottom: 4px; border-left: 3px solid #F47521; color: #aaa; max-width: 70%; }
        
        .message-bubble { transition: transform 0.2s; will-change: transform; }
        .msg-selected { background-color: rgba(244, 117, 33, 0.2) !important; }
    </style>
</head>
<body class="flex flex-col h-[100dvh]">

    <header id="default-header" class="w-full h-16 flex items-center justify-between px-4 fixed top-0 bg-[#000] border-b border-[#111] z-50">
        <button onclick="window.history.back()" class="text-white p-2"><i class="fas fa-arrow-left"></i></button>
        <div class="flex items-center gap-3" onclick="openProfile()">
            <img id="header-pfp" src="https://via.placeholder.com/100" class="w-9 h-9 rounded-full border border-[#F47521]">
            <div class="flex flex-col">
                <h2 id="header-name" class="text-white font-bold text-sm">Loading...</h2>
                <span id="header-status" class="text-[9px] text-gray-500 uppercase font-bold">Offline</span>
            </div>
        </div>
        <button onclick="toggleTopMenu()" class="text-white p-2"><i class="fas fa-ellipsis-v"></i></button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto hide-scrollbar pt-20 pb-24 px-4 flex flex-col gap-4">
        <div id="messages-list" class="flex flex-col gap-4"></div>
    </main>

    <footer class="w-full bg-[#000] border-t border-[#111] p-3 fixed bottom-0 z-50 flex gap-2 items-end">
        <button onclick="document.getElementById('image-upload').click()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-[#F47521] bg-[#111] rounded-xl"><i class="fas fa-camera"></i></button>
        <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="openImageEditor(event)">
        <div class="flex-1 bg-[#111] rounded-xl flex items-center relative">
            <textarea id="chat-input" rows="1" placeholder="Message..." class="w-full bg-transparent text-white text-sm px-4 py-3 outline-none resize-none hide-scrollbar"></textarea>
        </div>
        <button onclick="sendMessage()" class="w-10 h-10 bg-[#F47521] text-black rounded-xl"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, doc, getDoc, updateDoc, deleteDoc, serverTimestamp, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChgVcbDPzc6AMeoac1hCOx39YK_1mEKvU",
            authDomain: "blaze-x-db2f5.firebaseapp.com",
            projectId: "blaze-x-db2f5",
            storageBucket: "blaze-x-db2f5.firebasestorage.app",
            messagingSenderId: "770812306638",
            appId: "1:770812306638:web:eaf5ded647861f32c25c9f"
        };

        window.app = window.app || {};
        window.app.firebaseApp = initializeApp(firebaseConfig);
        window.db = getFirestore(window.app.firebaseApp);
        window.fs = { collection, query, orderBy, onSnapshot, addDoc, doc, getDoc, updateDoc, deleteDoc, serverTimestamp, where, getDocs, increment };
    </script>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('blazex_user_profile'));
        let targetUid = new URLSearchParams(window.location.search).get('user');
        let chatId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;

        async function renderMessage(msg) {
            const isMe = msg.senderId === currentUser.uid;
            let status = msg.read ? "Seen" : "Sent";
            
            // Dynamic Timestamp/Seen Logic
            const d = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
            const diff = Math.floor((new Date() - d) / 60000);
            if(msg.read) status = diff < 60 ? `Seen ${diff}m` : `Seen ${Math.floor(diff/60)}h`;
            else status = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const html = `
                <div id="msg-${msg.id}" class="message-bubble ${isMe ? 'self-end' : 'self-start'}" data-id="${msg.id}" data-text="${msg.text}">
                    ${msg.replyTo ? `<div class="reply-tag-outside">Replied</div><div class="reply-content-outside">${msg.replyText}</div>` : ''}
                    <div class="${isMe ? 'bubble-sent' : 'bubble-recv'}">
                        ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="w-48 rounded-lg mb-1">` : ''}
                        <p class="text-sm">${msg.text}</p>
                    </div>
                    <div class="text-[8px] font-bold text-gray-600 mt-1 ${isMe ? 'text-right' : 'text-left'}">${status}</div>
                </div>
            `;
            document.getElementById('messages-list').insertAdjacentHTML('beforeend', html);
        }

        // Live Listener
        fs.onSnapshot(fs.query(fs.collection(db, `chats/${chatId}/messages`), fs.orderBy("timestamp", "asc")), (snap) => {
            document.getElementById('messages-list').innerHTML = '';
            snap.forEach(doc => renderMessage({id: doc.id, ...doc.data()}));
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        });

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            await fs.addDoc(fs.collection(db, `chats/${chatId}/messages`), {
                text: input.value, senderId: currentUser.uid, timestamp: fs.serverTimestamp(), read: false
            });
            input.value = '';
        }
    </script>
</body>
</html>
