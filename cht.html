<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blaze-X | Premium Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: -apple-system, sans-serif; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Matte Black & Orange UI */
        .glass-header { background: #000; border-bottom: 1px solid #111; }
        .bubble-recv { background: #111; padding: 8px 14px; border-radius: 12px 12px 12px 2px; border: 1px solid #222; }
        .bubble-sent { background: #F47521; color: #000; padding: 8px 14px; border-radius: 12px 12px 2px 12px; font-weight: 600; }
        
        .reply-tag-outside { font-size: 8px; color: #F47521; text-transform: uppercase; font-weight: 900; margin-bottom: 2px; }
        .reply-content-outside { font-size: 11px; background: #111; padding: 6px 10px; border-radius: 8px; margin-bottom: 4px; border-left: 2px solid #F47521; color: #888; }
        
        .msg-selected { background-color: rgba(244, 117, 33, 0.2) !important; }
    </style>
</head>
<body class="flex flex-col h-[100dvh]">

    <header id="default-header" class="glass-header w-full h-16 flex items-center justify-between px-4 fixed top-0 z-50">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="text-white p-2"><i class="fas fa-arrow-left"></i></button>
            <img id="header-pfp" src="https://via.placeholder.com/50" class="w-9 h-9 rounded-full border border-gray-800">
            <div class="flex flex-col">
                <h2 id="header-name" class="text-sm font-bold">Loading...</h2>
                <span id="header-status" class="text-[9px] text-gray-500 uppercase">Offline</span>
            </div>
        </div>
        <button onclick="toggleTopMenu()" class="p-2"><i class="fas fa-ellipsis-v"></i></button>
        <div id="top-dropdown" class="hidden absolute right-4 top-14 w-32 bg-[#111] rounded-lg p-2 border border-white/10 text-xs">
            <button onclick="clearChat()" class="block w-full text-left p-2 hover:bg-white/5">Clear Chat</button>
            <button onclick="blockUser()" class="block w-full text-left p-2 text-red-500">Block</button>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto hide-scrollbar pt-20 pb-20 px-4 flex flex-col gap-4">
        <div id="messages-list" class="flex flex-col gap-3"></div>
    </main>

    <footer class="glass-header w-full p-2 fixed bottom-0 flex gap-2 items-end">
        <button onclick="document.getElementById('image-upload').click()" class="w-10 h-10 text-gray-400 bg-[#111] rounded-xl"><i class="fas fa-camera"></i></button>
        <input type="file" id="image-upload" class="hidden" onchange="openImageEditor(event)">
        <div class="flex-1 bg-[#111] rounded-xl border border-white/10">
            <textarea id="chat-input" rows="1" class="w-full bg-transparent text-sm p-3 outline-none resize-none" placeholder="Message..."></textarea>
        </div>
        <button onclick="sendMessage()" class="w-10 h-10 bg-[#F47521] text-black rounded-xl"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChgVcbDPzc6AMeoac1hCOx39YK_1mEKvU",
            authDomain: "blaze-x-db2f5.firebaseapp.com",
            projectId: "blaze-x-db2f5",
            storageBucket: "blaze-x-db2f5.firebasestorage.app",
            messagingSenderId: "770812306638",
            appId: "1:770812306638:web:eaf5ded647861f32c25c9f"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        let currentUser, targetUser, chatId;

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const targetUid = params.get('user');

            onAuthStateChanged(auth, async (user) => {
                if (!user) return window.location.href = 'index.html';
                const userSnap = await getDoc(doc(db, "users", user.uid));
                currentUser = userSnap.data();

                const targetSnap = await getDoc(doc(db, "users", targetUid));
                targetUser = targetSnap.data();

                chatId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;
                
                document.getElementById('header-name').innerText = targetUser.name;
                document.getElementById('header-pfp').src = targetUser.pfpLink;

                setupListener();
            });
        });

        function setupListener() {
            const q = query(collection(db, `chats/${chatId}/messages`), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('messages-list');
                list.innerHTML = '';
                snapshot.forEach(doc => renderMessage({id: doc.id, ...doc.data()}, list));
            });
        }

        window.renderMessage = (msg, container) => {
            const isMe = msg.senderId === currentUser.uid;
            // Status Logic
            const timeAgo = msg.timestamp ? getStatusText(msg.timestamp.toDate(), msg.read) : "Sending...";
            
            let html = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[80%] ${isMe ? 'self-end' : 'self-start'}">
                    ${msg.replyTo ? `<div class="reply-tag-outside">Replied</div><div class="reply-content-outside">${msg.replyText}</div>` : ''}
                    <div class="${isMe ? 'bubble-sent' : 'bubble-recv'}">
                        ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="w-48 rounded-lg mb-1">` : ''}
                        <p class="text-[13px]">${msg.text}</p>
                    </div>
                    <span class="text-[8px] text-gray-600 mt-1 uppercase font-bold">${timeAgo}</span>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        };

        function getStatusText(date, isRead) {
            const diff = Math.floor((new Date() - date) / 60000);
            if (!isRead) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (diff < 60) return `Seen ${diff}m`;
            if (diff < 1440) return `Seen ${Math.floor(diff/60)}h`;
            return `Seen ${Math.floor(diff/1440)}d`;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            await addDoc(collection(db, `chats/${chatId}/messages`), {
                text: input.value, senderId: currentUser.uid, timestamp: serverTimestamp(), read: false
            });
            input.value = '';
        };

        window.toggleTopMenu = () => document.getElementById('top-dropdown').classList.toggle('hidden');
    </script>
</body>
</html>
