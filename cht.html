<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blaze-X | Premium Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        /* Heavy & Rich Custom CSS */
        body { background-color: #030303; color: #ffffff; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; touch-action: pan-y; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-header { background: rgba(8, 8, 8, 0.95); border-bottom: 1px solid #1f1f1f; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .glass-footer { background: #0a0a0a; border-top: 1px solid #1f1f1f; }
        
        /* Message Bubbles - Heavy Style */
        .msg-sent { background: linear-gradient(135deg, #d85c00 0%, #F47521 100%); color: #000; border-radius: 12px 0 12px 12px; box-shadow: 0 2px 8px rgba(244,117,33,0.3); border: 1px solid rgba(255,255,255,0.1); }
        .msg-received { background: #141414; color: #fff; border-radius: 0 12px 12px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); border: 1px solid #2a2a2a; }
        
        /* Single Emoji Style */
        .emoji-only { background: transparent !important; box-shadow: none !important; border: none !important; font-size: 3rem; padding: 0 !important; }
        
        .typing-dot { animation: typing-bounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing-bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .message-row { transition: transform 0.2s cubic-bezier(0.1, 0.7, 0.1, 1); will-change: transform; position: relative; }
        
        /* Reply Swipe Indicators */
        .swipe-reply-icon { position: absolute; top: 50%; transform: translateY(-50%); opacity: 0; transition: opacity 0.2s; color: #F47521; }
        .swipe-right .swipe-reply-icon.left-icon { left: -40px; opacity: 1; }
        .swipe-left .swipe-reply-icon.right-icon { right: -40px; opacity: 1; color: #4facfe; }

        /* Bulk Select Mode */
        .select-checkbox { display: none; }
        .bulk-mode .select-checkbox { display: block; }
        .bulk-mode .message-row { padding-left: 2.5rem; transition: padding 0.3s; }
        
        /* Cropper customizations */
        .cropper-view-box, .cropper-face { border-radius: 0; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        
        // ⚠️ REPLACE WITH YOUR FIREBASE CONFIG ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyChgVcbDPzc6AMeoac1hCOx39YK_1mEKvU",
            authDomain: "blaze-x-db2f5.firebaseapp.com",
            projectId: "blaze-x-db2f5",
            storageBucket: "blaze-x-db2f5.firebasestorage.app",
            messagingSenderId: "770812306638",
            appId: "1:770812306638:web:eaf5ded647861f32c25c9f"
        };

        window.app = window.app || {};
        window.app.firebaseApp = initializeApp(firebaseConfig);
        window.app.db = getFirestore(window.app.firebaseApp);
    </script>
</head>
<body class="flex flex-col h-[100dvh]">

    <header class="glass-header w-full h-[68px] flex items-center justify-between px-3 shrink-0 z-50 fixed top-0">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="text-white p-2 hover:bg-white/10 rounded-full transition-colors">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile()">
                <img id="header-pfp" src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full object-cover border border-[#F47521]">
                <div class="flex flex-col">
                    <h2 id="header-name" class="text-white font-black text-sm tracking-wide leading-none">Loading...</h2>
                    <span id="header-status" class="text-[10px] text-gray-400 font-bold tracking-widest mt-1">Connecting...</span>
                </div>
            </div>
        </div>
        <div class="relative">
            <button onclick="toggleHeaderMenu()" class="text-white p-2 hover:bg-white/10 rounded-full transition-colors">
                <i class="fas fa-ellipsis-v text-lg px-1"></i>
            </button>
            <div id="header-menu" class="hidden absolute right-0 top-full mt-2 w-48 bg-[#111] border border-[#333] shadow-2xl rounded-lg overflow-hidden z-[100] text-xs font-bold uppercase tracking-wider">
                <button onclick="enableBulkMode()" class="w-full text-left px-4 py-3 text-white hover:bg-[#F47521] hover:text-black transition-colors border-b border-[#222]"><i class="fas fa-check-square w-5"></i> Select Msgs</button>
                <button onclick="clearChat()" class="w-full text-left px-4 py-3 text-white hover:bg-[#F47521] hover:text-black transition-colors border-b border-[#222]"><i class="fas fa-trash-alt w-5"></i> Clear Chat</button>
                <button onclick="blockUser()" class="w-full text-left px-4 py-3 text-red-500 hover:bg-red-500 hover:text-white transition-colors"><i class="fas fa-ban w-5"></i> Block</button>
            </div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto hide-scrollbar pt-[80px] pb-24 px-3 flex flex-col gap-1.5 scroll-smooth relative" onscroll="handleScroll()">
        <div id="chat-intro" class="w-full flex flex-col items-center justify-center py-12 hidden">
            <img id="intro-pfp" src="https://via.placeholder.com/150" class="w-28 h-28 rounded-full object-cover border-4 border-[#F47521] shadow-[0_0_20px_rgba(244,117,33,0.3)] mb-4">
            <h3 id="intro-name" class="text-xl font-black text-white mb-1 tracking-tight">...</h3>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-4">End-to-End Encrypted</p>
        </div>

        <div id="messages-list" class="flex flex-col gap-2 pb-2 mt-auto"></div>
        
        <div id="typing-indicator" class="hidden flex gap-1.5 items-center self-start bg-[#141414] border border-[#2a2a2a] rounded-2xl rounded-bl-sm px-4 py-3 ml-1 mb-2 shadow-md">
            <div class="w-1.5 h-1.5 bg-[#F47521] rounded-full typing-dot"></div>
            <div class="w-1.5 h-1.5 bg-[#F47521] rounded-full typing-dot"></div>
            <div class="w-1.5 h-1.5 bg-[#F47521] rounded-full typing-dot"></div>
        </div>
    </main>

    <button id="new-msg-btn" onclick="scrollToBottom()" class="hidden fixed bottom-[85px] left-1/2 -translate-x-1/2 bg-[#111] border border-[#F47521] rounded-full p-1.5 shadow-[0_4px_15px_rgba(0,0,0,0.8)] z-40 flex items-center justify-center gap-2 animate-bounce">
        <img id="new-msg-pfp" src="" class="w-6 h-6 rounded-full object-cover">
        <i class="fas fa-chevron-down text-[#F47521] text-xs pr-2"></i>
    </button>

    <div id="reply-banner" class="hidden fixed bottom-[60px] left-0 right-0 bg-[#0a0a0a] border-t border-[#1f1f1f] px-4 py-2 flex items-center justify-between z-40">
        <div class="flex flex-col border-l-4 border-[#F47521] pl-3 min-w-0">
            <span class="text-[10px] font-black text-[#F47521] uppercase tracking-widest">Replying to <span id="reply-target-name">...</span></span>
            <span id="reply-target-text" class="text-xs text-gray-400 truncate mt-0.5">...</span>
            <input type="hidden" id="reply-target-id">
        </div>
        <button onclick="cancelReply()" class="text-gray-500 hover:text-white p-3"><i class="fas fa-times"></i></button>
    </div>

    <div id="bulk-banner" class="hidden fixed bottom-0 left-0 right-0 h-[60px] glass-footer px-4 flex items-center justify-between z-[60]">
        <button onclick="disableBulkMode()" class="text-white text-xs font-bold uppercase tracking-wider">Cancel</button>
        <span class="text-white text-xs font-black"><span id="selected-count">0</span> Selected</span>
        <button onclick="deleteSelected()" class="bg-red-600 text-white px-5 py-2 rounded-lg text-xs font-black uppercase tracking-wider shadow-[0_0_15px_rgba(220,38,38,0.5)]">Delete</button>
    </div>

    <footer id="chat-footer" class="glass-footer w-full p-2.5 shrink-0 fixed bottom-0 z-50 flex gap-2 items-end">
        <button onclick="document.getElementById('image-upload').click()" class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-white bg-[#141414] border border-[#2a2a2a] rounded-xl shrink-0 transition-colors shadow-sm">
            <i class="fas fa-image text-lg"></i>
        </button>
        <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="openImageSetup(event)">
        
        <div class="flex-1 bg-[#141414] border border-[#2a2a2a] rounded-xl flex items-center focus-within:border-[#F47521] transition-colors relative min-h-[44px]">
            <textarea id="chat-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent text-white text-sm p-3 outline-none resize-none hide-scrollbar max-h-28" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'; triggerTyping();"></textarea>
        </div>
        
        <button id="send-btn" onclick="sendMessage()" class="w-11 h-11 flex items-center justify-center bg-[#F47521] text-black rounded-xl shrink-0 shadow-[0_2px_10px_rgba(244,117,33,0.4)] active:scale-95 transition-transform">
            <i class="fas fa-paper-plane text-lg pr-0.5 pt-0.5"></i>
        </button>
    </footer>

    <div id="img-setup-modal" class="fixed inset-0 bg-black/95 z-[200] hidden flex-col items-center pt-10 pb-4 px-4 opacity-0 transition-opacity">
        <div class="w-full flex justify-between items-center mb-6 max-w-md">
            <button onclick="closeImageSetup()" class="text-white text-sm font-bold uppercase"><i class="fas fa-times mr-2"></i> Cancel</button>
            <h3 class="text-white font-black uppercase text-sm tracking-widest text-[#F47521]">Send Image</h3>
        </div>
        <div class="w-full max-w-md bg-black relative rounded-lg overflow-hidden border border-[#333] shadow-2xl" style="height: 50vh;">
            <img id="cropper-target" src="" class="block max-w-full max-h-full mx-auto">
        </div>
        <div class="w-full max-w-md mt-6 flex flex-col gap-4">
            <select id="img-view-limit" class="bg-[#111] text-white border border-[#333] p-3 rounded-xl outline-none text-xs font-bold uppercase tracking-wider appearance-none">
                <option value="0">Unlimited Views (Keep in chat)</option>
                <option value="1">View Once 💣</option>
                <option value="2">View Twice 💣</option>
            </select>
            <textarea id="img-caption" rows="2" placeholder="Add a caption..." class="w-full bg-[#111] border border-[#333] rounded-xl text-white text-sm p-3 outline-none resize-none"></textarea>
            <button id="img-upload-btn" onclick="uploadAndSendImage()" class="w-full bg-[#F47521] text-black font-black uppercase py-4 rounded-xl shadow-[0_4px_20px_rgba(244,117,33,0.4)] hover:bg-white transition-colors">
                <i class="fas fa-paper-plane mr-2"></i> Send Image
            </button>
        </div>
    </div>

    <div id="image-viewer" class="fixed inset-0 bg-black/95 z-[300] hidden flex-col transition-opacity opacity-0 backdrop-blur-md">
        <div class="w-full p-4 flex justify-between items-center absolute top-0 left-0 bg-gradient-to-b from-black/80 to-transparent z-10">
            <button onclick="closeImageViewer()" class="text-white w-10 h-10 bg-white/10 rounded-full flex items-center justify-center backdrop-blur"><i class="fas fa-arrow-left"></i></button>
            <a id="viewer-download-btn" href="#" download="blazex_image.jpg" target="_blank" class="text-white w-10 h-10 bg-[#F47521] rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-download"></i></a>
        </div>
        <div class="flex-1 w-full flex items-center justify-center p-2 mt-16 pb-16">
            <img id="viewer-img" src="" class="max-w-full max-h-full object-contain drop-shadow-2xl rounded">
        </div>
    </div>

    <div id="msg-options-modal" class="fixed inset-0 bg-black/80 z-[200] hidden items-end justify-center transition-opacity opacity-0 backdrop-blur-sm" onclick="closeMsgOptions(event)">
        <div class="bg-[#141414] w-full max-w-md rounded-t-3xl p-5 flex flex-col gap-2 transform translate-y-full transition-transform duration-300 border-t border-[#333]" id="msg-options-panel">
            <div class="w-12 h-1.5 bg-[#333] rounded-full mx-auto mb-4"></div>
            <input type="hidden" id="opt-msg-id">
            <input type="hidden" id="opt-msg-text">
            
            <button id="opt-reply" onclick="optionReply()" class="w-full text-left px-5 py-4 text-white font-bold text-xs uppercase tracking-wider bg-[#1a1a1a] rounded-xl hover:bg-[#F47521] hover:text-black transition-colors"><i class="fas fa-reply w-6"></i> Reply</button>
            <button id="opt-share" onclick="optionShare()" class="w-full text-left px-5 py-4 text-white font-bold text-xs uppercase tracking-wider bg-[#1a1a1a] rounded-xl hover:bg-[#4facfe] hover:text-black transition-colors"><i class="fas fa-share w-6"></i> Forward / Share</button>
            <button id="opt-edit" onclick="optionEdit()" class="hidden w-full text-left px-5 py-4 text-white font-bold text-xs uppercase tracking-wider bg-[#1a1a1a] rounded-xl hover:bg-white hover:text-black transition-colors"><i class="fas fa-pen w-6"></i> Edit Text</button>
            <button id="opt-delete" onclick="optionDelete()" class="hidden w-full text-left px-5 py-4 text-red-500 font-bold text-xs uppercase tracking-wider bg-red-500/10 border border-red-500/20 rounded-xl hover:bg-red-500 hover:text-white transition-colors mt-2"><i class="fas fa-trash w-6"></i> Delete Message</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let targetUser = null;
        let chatId = null;
        let messagesUnsub = null;
        let typingTimeout = null;
        let isEditingId = null;
        let cropperInstance = null;
        let selectedFile = null;
        
        let pressTimer = null;
        let bulkSelected = new Set();
        let isAutoScrolling = false;

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUid = urlParams.get('user');

            if (!targetUid) { alert("Target user missing."); window.location.href = 'index.html'; return; }

            try {
                const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js');
                const firestore = await import('https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js');
                
                if (!window.app || !window.app.firebaseApp) {
                    document.getElementById('chat-loader').innerHTML = '<p class="text-red-500 text-xs font-bold text-center">Config Missing.</p>'; return;
                }

                const auth = getAuth(window.app.firebaseApp);
                window.db = window.app.db;
                window.fs = firestore;

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const userDoc = await fs.getDoc(fs.doc(db, "users", user.uid));
                        currentUser = userDoc.exists() ? userDoc.data() : { uid: user.uid, name: user.displayName || "User" };
                    } else {
                        const localGuest = localStorage.getItem('blazex_user_profile');
                        if (localGuest && JSON.parse(localGuest).uid.startsWith('anon_')) {
                            currentUser = JSON.parse(localGuest);
                        } else {
                            alert("Please log in."); window.location.href = 'index.html'; return;
                        }
                    }

                    if(currentUser.uid === targetUid) { alert("Cannot chat with yourself."); window.history.back(); return; }

                    chatId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;

                    const targetSnap = await fs.getDoc(fs.doc(db, "users", targetUid));
                    if (!targetSnap.exists()) { alert("User not found."); window.history.back(); return; }
                    targetUser = targetSnap.data();

                    const pfp = targetUser.pfpLink || targetUser.photoURL || 'https://via.placeholder.com/150';
                    document.getElementById('header-pfp').src = pfp;
                    document.getElementById('intro-pfp').src = pfp;
                    document.getElementById('new-msg-pfp').src = pfp;
                    document.getElementById('header-name').innerText = targetUser.name || 'Anonymous';
                    document.getElementById('intro-name').innerText = targetUser.name || 'Anonymous';
                    
                    document.getElementById('chat-loader').classList.add('hidden');
                    document.getElementById('chat-intro').classList.remove('hidden');

                    setupMessagesListener();
                    setupTypingListener();
                });
            } catch (err) { console.error("Init Error:", err); }
        });

        // --- LISTENERS ---
        function setupMessagesListener() {
            const q = fs.query(fs.collection(db, `chats/${chatId}/messages`), fs.orderBy("timestamp", "asc"));
            
            messagesUnsub = fs.onSnapshot(q, (snapshot) => {
                const list = document.getElementById('messages-list');
                let hasNewMsgFromOther = false;
                
                snapshot.docChanges().forEach(change => {
                    const data = { id: change.doc.id, ...change.doc.data() };
                    if (change.type === "added") {
                        renderMessage(data, list);
                        if(data.senderId !== currentUser.uid) {
                            hasNewMsgFromOther = true;
                            // Mark as seen immediately if we are at bottom
                            if(isNearBottom()) markAsSeen(data.id);
                        }
                    }
                    if (change.type === "modified") {
                        const el = document.getElementById(`msg-container-${data.id}`);
                        if(el) updateMessageDOM(el, data);
                    }
                    if (change.type === "removed") {
                        const el = document.getElementById(`msg-container-${data.id}`);
                        if(el) el.remove();
                    }
                });

                if (hasNewMsgFromOther && !isNearBottom()) {
                    document.getElementById('new-msg-btn').classList.remove('hidden');
                } else {
                    scrollToBottom();
                }
            });
        }

        function setupTypingListener() {
            fs.onSnapshot(fs.doc(db, "chats", chatId), (doc) => {
                const stat = document.getElementById('header-status');
                const ind = document.getElementById('typing-indicator');
                if (doc.exists() && doc.data().typing && doc.data().typing[targetUser.uid]) {
                    stat.innerText = "Typing..."; stat.className = "text-[10px] text-[#F47521] font-black uppercase tracking-widest mt-0.5";
                    ind.classList.remove('hidden');
                    if(isNearBottom()) scrollToBottom();
                } else {
                    stat.innerText = "Online"; stat.className = "text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-0.5";
                    ind.classList.add('hidden');
                }
            });
        }

        window.triggerTyping = () => {
            if (typingTimeout) clearTimeout(typingTimeout);
            fs.setDoc(fs.doc(db, "chats", chatId), { typing: { [currentUser.uid]: true } }, { merge: true });
            typingTimeout = setTimeout(() => fs.setDoc(fs.doc(db, "chats", chatId), { typing: { [currentUser.uid]: false } }, { merge: true }), 2000);
        }

        // --- SCROLL & READ RECEIPTS ---
        function isNearBottom() {
            const c = document.getElementById('chat-container');
            return (c.scrollHeight - c.scrollTop - c.clientHeight) < 150;
        }

        window.handleScroll = () => {
            if (isNearBottom()) {
                document.getElementById('new-msg-btn').classList.add('hidden');
                // Mark unseen messages as seen
                document.querySelectorAll('.msg-unseen').forEach(el => {
                    markAsSeen(el.getAttribute('data-id'));
                    el.classList.remove('msg-unseen');
                });
            }
        };

        window.scrollToBottom = () => {
            const c = document.getElementById('chat-container');
            isAutoScrolling = true;
            c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
            document.getElementById('new-msg-btn').classList.add('hidden');
            setTimeout(() => { isAutoScrolling = false; handleScroll(); }, 500);
        };

        async function markAsSeen(msgId) {
            try { await fs.updateDoc(fs.doc(db, `chats/${chatId}/messages`, msgId), { status: 'seen' }); } catch(e){}
        }

        // --- RENDER MESSAGE (RICH UI) ---
        const isEmojiOnly = (str) => {
            if(!str) return false;
            const emojiRegex = /^[\p{Emoji_Presentation}\p{Extended_Pictographic}\s]+$/u;
            return emojiRegex.test(str.trim());
        };

        function renderMessage(msg, container) {
            const isMe = msg.senderId === currentUser.uid;
            const isEmoji = isEmojiOnly(msg.text) && !msg.imageUrl && !msg.replyTo;
            
            let bubbleClass = isEmoji ? 'emoji-only' : (isMe ? 'msg-sent' : 'msg-received');
            let alignClass = isMe ? 'self-end' : 'self-start';
            let containerClass = `message-row flex flex-col w-full ${alignClass} mb-1`;
            
            let timeStr = "Sending...";
            let statusIcon = '<i class="fas fa-clock opacity-50"></i>';
            
            if (msg.timestamp) {
                const d = msg.timestamp.toDate ? msg.timestamp.toDate() : new Date(msg.timestamp);
                timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                if (isMe) {
                    if (msg.status === 'seen') statusIcon = '<i class="fas fa-check-double text-[#4facfe]"></i>';
                    else statusIcon = '<i class="fas fa-check text-black/60"></i>';
                } else { statusIcon = ''; }
            }

            // View Once Logic
            let imgHtml = '';
            if (msg.imageUrl) {
                if (msg.viewLimit && msg.viewLimit > 0) {
                    const views = msg.views || 0;
                    if (views >= msg.viewLimit && !isMe) {
                        imgHtml = `<div class="w-48 h-32 bg-black/40 border border-white/10 rounded-lg flex flex-col items-center justify-center text-gray-400 mb-1"><i class="fas fa-eye-slash text-2xl mb-2"></i><span class="text-[10px] font-bold uppercase tracking-wider">Expired Photo</span></div>`;
                    } else {
                        const icon = msg.viewLimit === 1 ? 'fa-bomb' : 'fa-image';
                        const label = msg.viewLimit === 1 ? 'View Once' : 'View Twice';
                        imgHtml = `<button onclick="viewSecureImage('${msg.id}', '${msg.imageUrl}', ${msg.viewLimit}, ${views}, ${isMe})" class="w-48 h-16 bg-black/40 border border-white/10 rounded-lg flex items-center px-4 text-white mb-1 shadow-inner hover:bg-black/60 transition"><i class="fas ${icon} text-[#F47521] text-xl mr-3"></i><div class="flex flex-col text-left"><span class="text-[10px] font-black uppercase tracking-wider">Photo</span><span class="text-[8px] text-gray-400">${label}</span></div></button>`;
                    }
                } else {
                    imgHtml = `<img src="${msg.imageUrl}" onclick="openImageViewer('${msg.imageUrl}')" class="w-full max-w-[220px] rounded-lg mb-1 cursor-pointer object-cover shadow-md">`;
                }
            }

            let replyHtml = '';
            if (msg.replyTo) {
                const repCol = isMe ? 'border-black/40 bg-black/10 text-black' : 'border-[#F47521] bg-white/5 text-gray-300';
                replyHtml = `<div class="border-l-4 ${repCol} pl-2 py-1.5 mb-1.5 rounded-r text-[10px] line-clamp-1 italic">${msg.replyText || 'Replied'}</div>`;
            }

            const safeText = msg.text ? msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
            const textStyle = isEmoji ? '' : 'text-sm break-words leading-snug';

            const unreadClass = (!isMe && msg.status !== 'seen') ? 'msg-unseen' : '';

            const html = `
                <div id="msg-container-${msg.id}" class="${containerClass} ${unreadClass}" data-id="${msg.id}" data-text="${safeText}" data-isme="${isMe}">
                    <i class="fas fa-reply swipe-reply-icon left-icon text-xl"></i>
                    <i class="fas fa-share swipe-reply-icon right-icon text-xl"></i>
                    
                    <div class="flex items-center gap-2 max-w-[85%] ${isMe ? 'flex-row-reverse' : ''}">
                        <input type="checkbox" class="select-checkbox w-5 h-5 accent-[#F47521]" value="${msg.id}" onchange="updateSelectedCount()">
                        
                        <div class="message-bubble relative px-3.5 py-2.5 ${bubbleClass}">
                            ${replyHtml}
                            ${imgHtml}
                            ${safeText ? `<p class="${textStyle}">${safeText}</p>` : ''}
                            <div class="flex items-center justify-end gap-1 mt-1 opacity-60">
                                <span class="text-[8px] font-black tracking-wider uppercase">${timeStr}</span>
                                ${msg.isEdited ? `<span class="text-[8px] italic ml-0.5">(edited)</span>` : ''}
                                <span class="ml-1 text-[10px]">${statusIcon}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            
            const newElem = document.getElementById(`msg-container-${msg.id}`);
            attachTouchEvents(newElem);
        }

        function updateMessageDOM(el, data) {
            const bubble = el.querySelector('.message-bubble');
            const p = el.querySelector('p');
            if(p && data.text) p.innerText = data.text;
            
            // Handle Expired views
            if (data.imageUrl && data.viewLimit && data.views >= data.viewLimit && data.senderId !== currentUser.uid) {
                const btn = bubble.querySelector('button');
                if(btn) btn.outerHTML = `<div class="w-48 h-32 bg-black/40 border border-white/10 rounded-lg flex flex-col items-center justify-center text-gray-400 mb-1"><i class="fas fa-eye-slash text-2xl mb-2"></i><span class="text-[10px] font-bold uppercase tracking-wider">Expired Photo</span></div>`;
            }
            
            if(data.isEdited && !bubble.innerHTML.includes('(edited)')) {
                bubble.querySelector('.flex.justify-end').insertAdjacentHTML('beforeend', `<span class="text-[8px] italic ml-0.5">(edited)</span>`);
            }
            
            // Update seen ticks
            if (data.senderId === currentUser.uid && data.status === 'seen') {
                const statusSpan = bubble.querySelector('.fa-check, .fa-clock');
                if(statusSpan) statusSpan.outerHTML = '<i class="fas fa-check-double text-[#4facfe]"></i>';
            }
            
            el.setAttribute('data-text', data.text || '');
        }

        // --- IMAGE ENGINE (VIEW & UPLOAD) ---
        window.openImageViewer = (src) => {
            const v = document.getElementById('image-viewer');
            document.getElementById('viewer-img').src = src;
            document.getElementById('viewer-download-btn').href = src;
            v.classList.remove('hidden'); v.classList.add('flex');
            setTimeout(() => v.classList.remove('opacity-0'), 10);
        };
        window.closeImageViewer = () => {
            const v = document.getElementById('image-viewer');
            v.classList.add('opacity-0');
            setTimeout(() => { v.classList.add('hidden'); v.classList.remove('flex'); }, 300);
        };

        window.viewSecureImage = async (msgId, src, limit, views, isMe) => {
            openImageViewer(src);
            if (!isMe && views < limit) {
                try { await fs.updateDoc(fs.doc(db, `chats/${chatId}/messages`, msgId), { views: fs.increment(1) }); } catch(e){}
            }
        };

        window.openImageSetup = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile = file;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.getElementById('cropper-target');
                img.src = ev.target.result;
                const modal = document.getElementById('img-setup-modal');
                modal.classList.remove('hidden'); modal.classList.add('flex');
                setTimeout(() => modal.classList.remove('opacity-0'), 10);

                if (cropperInstance) cropperInstance.destroy();
                cropperInstance = new Cropper(img, { viewMode: 1, dragMode: 'move', background: false });
            };
            reader.readAsDataURL(file);
        };

        window.closeImageSetup = () => {
            const modal = document.getElementById('img-setup-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
            if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
            document.getElementById('image-upload').value = '';
            document.getElementById('img-caption').value = '';
        };

        window.uploadAndSendImage = async () => {
            if (!cropperInstance) return;
            const btn = document.getElementById('img-upload-btn');
            const limit = parseInt(document.getElementById('img-view-limit').value);
            const caption = document.getElementById('img-caption').value.trim();
            
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Uploading...`;
            btn.disabled = true;

            cropperInstance.getCroppedCanvas({ imageSmoothingEnabled: true, imageSmoothingQuality: 'high' }).toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("image", blob, "chat_img.jpg");
                
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=4a683051e76ed12880a42aefa6ed427b`, { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    if(data.success) {
                        const msgData = {
                            imageUrl: data.data.url, senderId: currentUser.uid, timestamp: fs.serverTimestamp(), status: 'sent'
                        };
                        if (caption) msgData.text = caption;
                        if (limit > 0) { msgData.viewLimit = limit; msgData.views = 0; }
                        
                        const replyId = document.getElementById('reply-target-id').value;
                        if (replyId) { msgData.replyTo = replyId; msgData.replyText = document.getElementById('reply-target-text').innerText; }

                        await fs.addDoc(fs.collection(db, `chats/${chatId}/messages`), msgData);
                        closeImageSetup();
                        cancelReply();
                    }
                } catch(e) { alert("Upload failed."); }
                
                btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i> Send Image`;
                btn.disabled = false;
            }, 'image/jpeg', 0.8);
        };

        // --- CORE MESSAGING ---
        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            const replyId = document.getElementById('reply-target-id').value;
            const replyText = document.getElementById('reply-target-text').innerText;
            const btn = document.getElementById('send-btn');
            
            if (!text && !isEditingId) return;

            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin text-sm"></i>`;
            input.disabled = true;

            try {
                if (isEditingId) {
                    await fs.updateDoc(fs.doc(db, `chats/${chatId}/messages`, isEditingId), { text, isEdited: true });
                    isEditingId = null;
                } else {
                    const msgData = { text, senderId: currentUser.uid, timestamp: fs.serverTimestamp(), status: 'sent' };
                    if (replyId) { msgData.replyTo = replyId; msgData.replyText = replyText; }
                    await fs.addDoc(fs.collection(db, `chats/${chatId}/messages`), msgData);
                }
                input.value = ''; input.style.height = '44px';
                cancelReply();
            } catch(e) { alert("Failed to send."); }

            input.disabled = false;
            btn.innerHTML = `<i class="fas fa-paper-plane text-lg pr-0.5 pt-0.5"></i>`;
            input.focus();
        };

        // --- GESTURES & MENUS ---
        window.toggleHeaderMenu = () => {
            const m = document.getElementById('header-menu');
            m.classList.toggle('hidden');
        };
        document.addEventListener('click', (e) => {
            if(!e.target.closest('#header-menu') && !e.target.closest('.fa-ellipsis-v')) {
                document.getElementById('header-menu').classList.add('hidden');
            }
        });

        window.openProfile = () => window.location.href = `profile.html?user=${targetUser.uid}`;

        window.blockUser = () => { alert("User Blocked. Messages disabled."); window.history.back(); };
        
        // --- BULK DELETE LOGIC ---
        window.enableBulkMode = () => {
            document.getElementById('header-menu').classList.add('hidden');
            document.getElementById('chat-container').classList.add('bulk-mode');
            document.getElementById('chat-footer').classList.add('hidden');
            document.getElementById('bulk-banner').classList.remove('hidden');
            bulkSelected.clear(); updateSelectedCount();
        };
        window.disableBulkMode = () => {
            document.getElementById('chat-container').classList.remove('bulk-mode');
            document.getElementById('bulk-banner').classList.add('hidden');
            document.getElementById('chat-footer').classList.remove('hidden');
            document.querySelectorAll('.select-checkbox').forEach(cb => cb.checked = false);
        };
        window.updateSelectedCount = () => {
            let count = 0; bulkSelected.clear();
            document.querySelectorAll('.select-checkbox:checked').forEach(cb => { count++; bulkSelected.add(cb.value); });
            document.getElementById('selected-count').innerText = count;
        };
        window.deleteSelected = async () => {
            if(bulkSelected.size === 0) return;
            if(!confirm(`Delete ${bulkSelected.size} messages?`)) return;
            const batch = fs.writeBatch(db);
            bulkSelected.forEach(id => batch.delete(fs.doc(db, `chats/${chatId}/messages`, id)));
            await batch.commit();
            disableBulkMode();
        };
        window.clearChat = async () => {
            if(!confirm("Clear ALL messages? This cannot be undone.")) return;
            document.getElementById('header-menu').classList.add('hidden');
            const q = fs.query(fs.collection(db, `chats/${chatId}/messages`));
            const snaps = await fs.getDocs(q);
            const batch = fs.writeBatch(db);
            snaps.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        };

        // --- REPLY PREVIEW ---
        window.setReplyState = (id, text, username) => {
            document.getElementById('reply-target-id').value = id;
            document.getElementById('reply-target-name').innerText = username;
            document.getElementById('reply-target-text').innerText = text || 'Media';
            document.getElementById('reply-banner').classList.remove('hidden');
            document.getElementById('chat-input').focus();
        };
        window.cancelReply = () => {
            document.getElementById('reply-target-id').value = '';
            document.getElementById('reply-banner').classList.add('hidden');
            isEditingId = null;
        };

        // --- SWIPE & LONG PRESS ---
        function attachTouchEvents(containerElem) {
            const el = containerElem;
            let startX = 0; let startY = 0; let currentX = 0;
            
            el.addEventListener('touchstart', (e) => {
                if(document.getElementById('chat-container').classList.contains('bulk-mode')) return;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                currentX = 0; el.classList.remove('transition-transform');
                pressTimer = setTimeout(() => { triggerLongPress(el); }, 500);
            }, {passive: true});

            el.addEventListener('touchmove', (e) => {
                if(document.getElementById('chat-container').classList.contains('bulk-mode')) return;
                const dx = e.touches[0].clientX - startX;
                const dy = Math.abs(e.touches[0].clientY - startY);
                if (dy > 10) { clearTimeout(pressTimer); el.style.transform = `translateX(0px)`; return; }
                if (Math.abs(dx) > 10) clearTimeout(pressTimer);
                currentX = dx;
                
                // Add class for icon visibility based on direction
                if(dx > 0) { el.classList.add('swipe-right'); el.classList.remove('swipe-left'); }
                else { el.classList.add('swipe-left'); el.classList.remove('swipe-right'); }

                if(dx > 0 && dx < 100) el.style.transform = `translateX(${dx}px)`; // Right Swipe
                if(dx < 0 && dx > -100) el.style.transform = `translateX(${dx}px)`; // Left Swipe
            }, {passive: true});

            el.addEventListener('touchend', (e) => {
                clearTimeout(pressTimer);
                el.classList.add('transition-transform');
                el.style.transform = `translateX(0px)`;
                el.classList.remove('swipe-right', 'swipe-left');

                if (currentX > 80) { // High threshold
                    navigator.vibrate?.(50);
                    const isMe = el.getAttribute('data-isme') === "true";
                    setReplyState(el.getAttribute('data-id'), el.getAttribute('data-text'), isMe ? "Yourself" : targetUser.name);
                } else if (currentX < -80) {
                    navigator.vibrate?.(50);
                    const text = el.getAttribute('data-text');
                    if (window.app.components && window.app.components.share && text) window.app.components.share(text);
                }
            });
        }

        function triggerLongPress(el) {
            navigator.vibrate?.(50);
            const id = el.getAttribute('data-id');
            const text = el.getAttribute('data-text');
            const isMe = el.getAttribute('data-isme') === "true";

            document.getElementById('opt-msg-id').value = id;
            document.getElementById('opt-msg-text').value = text;
            document.getElementById('opt-edit').classList.toggle('hidden', !isMe || !text);
            document.getElementById('opt-delete').classList.toggle('hidden', !isMe);

            const modal = document.getElementById('msg-options-modal');
            const panel = document.getElementById('msg-options-panel');
            
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('translate-y-full'); }, 10);
        }

        window.closeMsgOptions = (e) => {
            if (e && e.target.id !== 'msg-options-modal'
