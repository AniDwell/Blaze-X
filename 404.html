<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Blaze-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div id="global-404-root" class="w-screen h-screen flex items-center justify-center"></div>

    <script src="404.js"></script>
    <script>
        // Page load hote hi turant error show karo
        document.addEventListener('DOMContentLoaded', () => {
            window.BlazeX.show404(
                'global-404-root', 
                '404 Error: The page you are looking for does not exist or has been moved to another dimension.'
            );
        });
    </script>
</body>
</html>
