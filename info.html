<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blaze-X | Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white overflow-x-hidden font-sans">

    <div id="header-container"></div>
    
    <div id="info-container" class="w-full min-h-screen pb-20"></div>

    <script src="app.js"></script>
    <script src="header.js"></script>
    <script src="info.js"></script>
    
    <script>
        // Set view state and trigger component renders
        window.app.state.currentView = 'info';
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.app.components.header) window.app.components.header();
            if (window.app.components.info) await window.app.components.info();
        });
    </script>
</body>
</html>
