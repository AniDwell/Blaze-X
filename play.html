<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blaze-X | Player Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* White & Orange TikTok Style Loader */
        .tk-loader {
            width: 40px;
            height: 40px;
            position: relative;
        }
        .tk-loader::before, .tk-loader::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: tk-pulse 1s infinite ease-in-out;
        }
        .tk-loader::before {
            background-color: #F47521; /* Orange Dot */
            animation-name: tk-pulse-orange;
        }
        .tk-loader::after {
            background-color: #ffffff; /* White Dot */
            animation-name: tk-pulse-white;
        }

        /* Intersecting Orbit Keyframes */
        @keyframes tk-pulse-orange {
            0%   { transform: translate(-100%, -50%) scale(1); z-index: 1; }
            25%  { transform: translate(-50%, -50%) scale(1.3); z-index: 2; }
            50%  { transform: translate(0%, -50%) scale(1); z-index: 2; }
            75%  { transform: translate(-50%, -50%) scale(0.7); z-index: 1; }
            100% { transform: translate(-100%, -50%) scale(1); z-index: 1; }
        }
        @keyframes tk-pulse-white {
            0%   { transform: translate(0%, -50%) scale(1); z-index: 2; }
            25%  { transform: translate(-50%, -50%) scale(0.7); z-index: 1; }
            50%  { transform: translate(-100%, -50%) scale(1); z-index: 1; }
            75%  { transform: translate(-50%, -50%) scale(1.3); z-index: 2; }
            100% { transform: translate(0%, -50%) scale(1); z-index: 2; }
        }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-x-hidden min-h-screen flex flex-col">

    <div id="global-loader" class="fixed inset-0 z-[999] bg-[#050505] flex items-center justify-center transition-opacity duration-500">
        <div class="tk-loader scale-150"></div>
    </div>

    <div id="header-container"></div>

    <main id="player-workspace" class="flex-1 w-full max-w-7xl mx-auto px-4 md:px-12 pt-24 pb-24 md:pb-12 flex flex-col gap-6 opacity-0 transition-opacity duration-700" style="opacity: 1;">
        
        <div id="video-container" class="w-full aspect-video md:aspect-[21/9] bg-[#0a0a0a] rounded-xl border border-white/10 shadow-2xl flex flex-col items-center justify-center relative overflow-hidden">
            <div class="tk-loader scale-125 mb-4"></div>
            <p class="text-gray-500 font-black uppercase tracking-widest text-[10px] md:text-xs">Initializing Player Engine...</p>
        </div>

        <div id="player-metadata-container" class="w-full flex flex-col gap-3">
            <div class="h-8 w-3/4 md:w-1/2 bg-[#111] rounded border border-white/5 animate-pulse"></div>
            <div class="h-4 w-1/4 md:w-1/6 bg-[#111] rounded border border-white/5 animate-pulse"></div>
        </div>

        <div id="player-controls-container" class="w-full grid grid-cols-1 lg:grid-cols-3 gap-6 mt-2">
            <div class="lg:col-span-2 h-32 md:h-40 bg-[#111] rounded-xl border border-white/5 animate-pulse flex items-center justify-center">
                <span class="text-gray-600 font-bold uppercase text-[10px] tracking-widest">Awaiting Stream Data</span>
            </div>
            <div class="lg:col-span-1 h-32 md:h-40 bg-[#111] rounded-xl border border-white/5 animate-pulse flex items-center justify-center">
                <span class="text-gray-600 font-bold uppercase text-[10px] tracking-widest">Awaiting Episodes</span>
            </div>
        </div>

    </main>

    <div id="bottom-nav-container"></div>

    <script>
        window.app = window.app || {
            state: {
                activeProfile: JSON.parse(localStorage.getItem('blazex_user_profile')) || null,
                resolvedStreamManifest: null // Ready to catch the pre-fetched payload from info.js
            },
            components: {}
        };
    </script>

    <script type="module" src="header.js"></script>
    <script src="bottomnav.js"></script>
    <script src="auth.js"></script>

    <script src="play.js"></script> 
    <script src="player.js"></script> 
    
    <script>
        // Mount external layout components safely once DOM is ready
        document.addEventListener("DOMContentLoaded", () => {
            if (window.app.components.header) window.app.components.header();
            if (window.app.components.bottomnav) window.app.components.bottomnav();
            
            // Failsafe execution: Ensure play engine boots up if it didn't auto-invoke
            if (window.app.components.play && document.getElementById('play-content-wrapper') === null) {
                window.app.components.play();
            }
        });

        // Remove loading screen elegantly after initialization
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('global-loader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.remove(), 500); // remove from DOM after fade out
                }
            }, 600); // Slight delay to ensure a smooth visual transition
        });
    </script>

</body>
</html>
